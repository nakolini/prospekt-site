<!DOCTYPE html>
<html lang="en">
<head>

    <title>Support — Prospekt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;

            color: #fff;
            min-height: 100vh;

            flex-direction: column;
